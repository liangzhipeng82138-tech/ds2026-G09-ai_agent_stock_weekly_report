<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股 & 美股周报 | ds2026 第09组 | 2026年第20周</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #06080F;
            --bg-secondary: #0B0F1A;
            --bg-sidebar: #0A0E1A;
            --bg-card: rgba(255,255,255,0.03);
            --border-color: rgba(255,255,255,0.06);
            --accent: #00D4FF;
            --accent2: #7C3AED;
            --accent3: #10B981;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(135deg, rgba(0,212,255,0.08) 0%, rgba(124,58,237,0.05) 100%);
            pointer-events: none;
        }

        .sidebar-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .sidebar-logo .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,212,255,0.25);
        }

        .sidebar-logo .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            padding-left: 52px;
            letter-spacing: 0.5px;
        }

        /* ===== Navigation ===== */
        .nav-section {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 12px 8px;
            margin-top: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 2px;
            position: relative;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(124,58,237,0.08));
            color: #fff;
            font-weight: 500;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 24px;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            border-radius: 0 3px 3px 0;
        }

        .nav-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.04);
            transition: all 0.25s ease;
        }

        .nav-item.active .nav-icon {
            background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(124,58,237,0.15));
            box-shadow: 0 2px 8px rgba(0,212,255,0.15);
        }

        .nav-text {
            display: flex;
            flex-direction: column;
        }

        .nav-text .chapter-num {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .nav-item.active .nav-text .chapter-num {
            color: var(--accent);
        }

        .nav-text .chapter-title {
            font-size: 13px;
            line-height: 1.3;
        }

        /* ===== Sidebar Footer ===== */
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
        }

        .footer-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 20px;
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .footer-info {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .footer-info span {
            color: var(--text-secondary);
        }

        /* ===== Main Content ===== */
        .main-content {
            flex: 1;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .main-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ===== Loading overlay ===== */
        .loading-overlay {
            position: fixed;
            top: 0; left: var(--sidebar-width); right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            :root { --sidebar-width: 60px; }
            .sidebar-header, .nav-text, .sidebar-footer .footer-info { display: none; }
            .nav-item { justify-content: center; padding: 12px 8px; }
            .sidebar-footer { padding: 8px; text-align: center; }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<!-- Sidebar Navigation -->
<nav class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon">📈</div>
            <div class="logo-text">股市周报</div>
        </div>
        <div class="sidebar-subtitle">2026年5月11日 — 5月15日 · 第20周</div>
    </div>

    <div class="nav-section">
        <div class="nav-label">周报章节</div>

        <div class="nav-item active" data-page="1" onclick="switchChapter(1)">
            <div class="nav-icon">🌐</div>
            <div class="nav-text">
                <span class="chapter-num">CHAPTER 01</span>
                <span class="chapter-title">大盘整体行情概览</span>
            </div>
        </div>

        <div class="nav-item" data-page="2" onclick="switchChapter(2)">
            <div class="nav-icon">🔄</div>
            <div class="nav-text">
                <span class="chapter-num">CHAPTER 02</span>
                <span class="chapter-title">板块与行业轮动分析</span>
            </div>
        </div>

        <div class="nav-item" data-page="3" onclick="switchChapter(3)">
            <div class="nav-icon">💰</div>
            <div class="nav-text">
                <span class="chapter-num">CHAPTER 03</span>
                <span class="chapter-title">资金流向分析</span>
            </div>
        </div>

        <div class="nav-item" data-page="4" onclick="switchChapter(4)">
            <div class="nav-icon">🎯</div>
            <div class="nav-text">
                <span class="chapter-num">CHAPTER 04</span>
                <span class="chapter-title">重点个股与热点事件</span>
            </div>
        </div>

        <div class="nav-item" data-page="5" onclick="switchChapter(5)">
            <div class="nav-icon">🏛️</div>
            <div class="nav-text">
                <span class="chapter-num">CHAPTER 05</span>
                <span class="chapter-title">宏观与政策面分析</span>
            </div>
        </div>

        <div class="nav-item" data-page="6" onclick="switchChapter(6)">
            <div class="nav-icon">⚠️</div>
            <div class="nav-text">
                <span class="chapter-num">CHAPTER 06</span>
                <span class="chapter-title">风险与情绪研判</span>
            </div>
        </div>
    </div>

    <div class="sidebar-footer">
        <div class="footer-badge">● LIVE REPORT</div>
        <div class="footer-info">
            <span>ds2026</span> · 第09组<br>
            数据周期：2026-W20<br>
            AI Agent 自动生成
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<div class="main-content">
    <iframe id="chapterFrame" src="pages/index_1.html"></iframe>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
</div>

<script>
    let currentPage = 1;

    function switchChapter(num) {
        if (num === currentPage) return;
        currentPage = num;

        // Update active state
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', parseInt(item.dataset.page) === num);
        });

        // Show loading
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.remove('hidden');

        // Switch iframe
        const frame = document.getElementById('chapterFrame');
        frame.src = `pages/index_${num}.html`;
    }

    // Hide loading when iframe loads
    document.getElementById('chapterFrame').addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }, 200);
    });

    // Initial load
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }, 500);
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown' && currentPage < 6) switchChapter(currentPage + 1);
        if (e.key === 'ArrowUp' && currentPage > 1) switchChapter(currentPage - 1);
    });
</script>

</body>
</html>
